<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(to bottom, #829782, #ccffcc);
        }
        button {
            padding: 20px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>this is index page</h1>
    <h3 id="welcome">Welcome to Chitkara</h3>
    <button id="submit">Exit</button>

</body>
</html>

<script>
    // console.log("hello")
var greet=document.getElementById("welcome")
console.log(greet)
var btn=document.getElementById("submit")
btn.addEventListener("click",handleClick)
var flag =false
function handleClick(){
    // alert ("button is clicked")
    flag=!flag
    if(flag){
         greet.innerText="thank for visiting"
    greet.style.color="red"
    btn.innerText="welcome"
    }
   else{
     greet.innerText="welcome to chitkkara"
    greet.style.color="grey"
    btn.innerText="exit exit exit"
   }
}
</script>
